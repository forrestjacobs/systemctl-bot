[package]
name = "systemctl-bot"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "systemctl-bot"
path = "src/main.rs"

[[bin]]
name = "register-systemctl-bot"
path = "src/register.rs"

[dependencies]
actix-web = "3"
async-std = "1.9.0"
indexmap = "1.8"
serde_json = "1.0"
toml = "0.5"

[dependencies.reqwest]
version = "0.10"
features = ["blocking"]

[dependencies.rusty_interaction]
version = "0.2"
features = ["handler"]

[dependencies.serde]
version = "1.0"
features = ["derive"]
