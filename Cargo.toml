[dependencies]
actix-web = "3"
serde_json = "1.0"
toml = "0.5"

[dependencies.reqwest]
version = "0.10"
features = ["blocking"]

[dependencies.rusty_interaction]
version = "0.2"
features = ["handler"]

[dependencies.serde]
version = "1.0"
features = ["derive"]
